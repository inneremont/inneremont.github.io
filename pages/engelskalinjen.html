<!DOCTYPE html>


<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

<script src="https://unpkg.com/aframe-event-set-component@3.0.3/dist/aframe-event-set-component.min.js"></script>


<!-- Creates -->
<a-scene background="color: #FDDA0D">
    <!-- Create an empty video tag to hold our webcam stream -->
<a-assets>
        <video id="webcam" playsinline crossorigin="anonymous"></video>

</a-assets>





      <!-- video screen -->
      <a-box src= "#webcam"  position="11 0 0" rotation="0 90 0"  width ="15" height = "10" 
      event-set__mouseenter="scale: 2 2 2"
       
    >
      
      </a-box>

        <a-box src= "#webcam"  position="0 0 11" rotation="0 0 0"  width ="15" height = "10"></a-box>

              <a-box src= "#webcam"  position="0 0 -11" rotation="0 0 0"  width ="15" height = "10"></a-box>


      <!-- floor -->
      <a-plane src="#webcam" position="0 0 0" rotation="-90 0 0" width="25" height="25" ></a-plane>

        <a-camera>
    <a-cursor></a-cursor>
    <!-- Or <a-entity cursor></a-entity> -->
  </a-camera>

</a-scene>

<!-- Start the webcam stream and attach it to the video element -->
<script>
  // You can also set which camera to use (front/back/etc)
  // @SEE https://developer.mozilla.org/en-US/docs/Web/API/MediaDevices/getUserMedia
  navigator.mediaDevices.getUserMedia({audio: false, video: true})
  .then(stream => {
    let $video = document.querySelector('video')
    $video.srcObject = stream
    $video.onloadedmetadata = () => {
      $video.play()
    }
  })
</script>
</html>
