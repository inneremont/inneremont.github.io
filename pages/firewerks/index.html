<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame Particle System Component Example</title>
    <meta name="description" content="Vinterland">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="dist/aframe-particle-system-component.min.js"></script>

    <script src="https://jeromeetienne.github.io/AR.js/aframe/build/aframe-ar.js"></script>


 
  </head>

 <body style="margin: 0px; overflow: hidden;">

<a-scene embedded vr-mode-ui="enabled: false;" arjs="debugUIEnabled: false;">

   
      <a-entity position="0 2.25 -15" particle-system="preset: snow; texture: dist/images/butkan.png; color: #ffffff;  size: 2.2, 0; velocityValue: 0.001 1.001 0.001;
                velocitySpread: 0.5 0 0.5;  particleCount: 5000"></a-entity>







    <a-entity camera></a-entity>

    </a-scene>
  </body>
</html>
