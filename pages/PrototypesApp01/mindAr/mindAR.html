<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>


 

    <a-scene 
        mindar-image="imageTargetSrc: ./target/prototypes.mind; maxTrack: 2
        uiScanning:no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
    <a-assets>

    <video 
       video id="vid01" 
       src="asset/clouds.mp4" 
       timeout="10000"
       type="video/mp4" 
       loop="true" 
       playsinline autoplay
       ></video>

      <video 
       video id="vid02" 
       src="asset/moon.mp4" 
       timeout="10000"
       type="video/mp4" 
       loop="true" 
       playsinline autoplay
       ></video>

  
  
      </a-assets>

      <a-camera 
      position="0 0 0" 
      look-controls="enabled: false
      "></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane  material="src: #vid01"  position="0 0 0" height="10" width="2" rotation="0 0 0"></a-plane>
      </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
        <a-plane  material="src: #vid02"  position="0 0 0" height="10" width="2" rotation="0 0 0"></a-plane>   
      </a-entity>

    </a-scene>
  </body>
</html>
