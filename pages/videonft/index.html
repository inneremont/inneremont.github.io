<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>


    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script>
      AFRAME.registerComponent("videohandler", {
        init: function () {
          var marker = this.el;

          this.vid = document.querySelector("#vid");

          marker.addEventListener(
            "markerFound",
            function () {
              console.log("markerFound");

              this.vid.play();
            }.bind(this)
          );

          marker.addEventListener(
            "markerLost",
            function () {
              console.log("markerLost");
              this.vid.pause();
              this.vid.currentTime = 0;
            }.bind(this)
          );
        }
      });
      AFRAME.registerComponent("disable-culling", {
        init: function () {
          this.el.addEventListener("loaded", (evt) => {
            const mesh = this.el.getObject3D("mesh");
            mesh.frustumCulled = false;
          });
        },
        tick: function () {
          //if (!this.el.object3D.visible) return;
          //console.log(this.el.object3D.getWorldPosition())
        }
      });

      AFRAME.registerComponent("override-visible", {
        tick: function () {
          this.el.object3D.visible = true;
        }
      });
    </script>

    <style>
      .arjs-loader {
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background-color: rgba(255, 255, 255, 0.8);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .arjs-loader div {
        text-align: center;
        font-size: 1.25em;
        color: blue;
      }
    </style>
    <title>Plakat Digital</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <div class="arjs-loader">
      <div>Hetki Pieni..</div>
    </div>
    <a-scene
      vr-mode-ui="enabled: false;"
      renderer="logarithmicDepthBuffer: true; precision: highp ;"
      embedded
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
    >
      <a-assets>
        <video

         src="https://github.com/inneremont/inneremont.github.io/blob/main/pages/videonft/assets/koanim.mp4" 
          preload="auto"
          id="vid"
          response-type="arraybuffer"
          loop
          crossorigin
          webkit-playsinline
          autoplay
          muted
          playsinline
        ></video>
      </a-assets>

      <a-nft
        position="0 0 0"
        type="nft"
        url="https://github.com/inneremont/inneremont.github.io/blob/main/pages/videonft/descriptors/rac18"
        smooth="true"
        smoothCount="20"
        smoothTolerance="0.05"
        smoothThreshold="10"
        videohandler
      >
 

         <a-plane 
         disable-culling
         material="src: #vid" 
         height="142" 
         width="100" 
         position="150 0 -230"
         rotation="-90 0 0"
         scale="3 3 3"
         ></a-plane>


<!-- src="https://s1.webmshare.com/DeEQK.webm" -->

      </a-nft>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
