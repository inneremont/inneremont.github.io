<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>origin</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/inneremont/inneremont.github.io@main/pages/Pavillion/assets/js/play-on-click.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/inneremont/inneremont.github.io@main/pages/Pavillion/assets/js/hide-on-play.js"></script>

      <style>

   #invisible {
    position: fixed;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background-color:black;
    color:white;
    font-family: georgia;
    font-size:4vw;
     font-style: normal;
    padding-top:45vh;
    text-align:center;

      z-index: 10;
}
  </style>
  </head>

  <body style="margin : 0px; overflow: hidden;" >

<div>
  
   <a-scene
      vr-mode-ui="enabled: false" loading-screen="enabled:false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    >

          <a-assets>
        <video
         id="vid01"  
         crossorigin="anonymous"
         preload="auto"      
         src="https://res.cloudinary.com/dw8kdyzxc/video/upload/v1676390910/media/hus024_ozbntw.mp4" 
          autoplay
          loop ="true"
          
        ></video>


      </a-assets>

         <a-plane 
   
         material="src: #vid01" 
         height="10" 
         width="10" 
         position="-10 0 -10"
         rotation="0 0 0"
         gps-entity-place="latitude:59.833500; longitude:22.964515;"
          visible="false" 
         play-on-click
         ></a-plane>
   
      <a-camera gps-camera rotation-reader> 

      </a-camera>
    </a-scene>

</div>

 
        <div id="invisible" onclick="change()">«origins»</div>
   <script>function change(){
   document.getElementById("invisible").style.display = "none";

  }</script>
  </body>
</html>
