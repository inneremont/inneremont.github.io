<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Virtual Tour Proto</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  </head>

  <body>
    <a-scene
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    >

      <a-assets>
    <img id="img01" src="assets/images/01mar.png">
    <img id="img02" src="assets/images/02mar.png">
    <img id="img03" src="assets/images/03.png">
    <img id="img04" src="assets/images/04skvar.png">
    <img id="img05c" src="assets/images/05ban.png">
    <img id="img06" src="assets/images/06seg.png">
    <img id="img07" src="assets/images/07app.png">
    <img id="img08" src="assets/images/08app.png">
    <img id="img09" src="assets/images/09park.png">
    <img id="img10" src="assets/images/10des.png">    
  </a-assets>



        <a-image 
        src="#img05c"
        width="3" 
        width="5"      
        position="0 0 0"
        rotation="0 0 45"
        gps-entity-place="latitude:59.833608; longitude:22.964431;"
        ></a-image>

      <a-camera gps-camera rotation-reader> </a-camera>
    </a-scene>
  </body>
</html>
