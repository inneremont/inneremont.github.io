<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Virtual Tour Proto</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-layout-component@4.3.1/dist/aframe-layout-component.min.js"></script> 

  </head>

  <body>
    <a-scene
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    >

      <a-assets>
    <img id="img01" src="assets/images/01mar.png">
    <img id="img02" src="assets/images/02mar.png">
    <img id="img03" src="assets/images/03.png">
    <img id="img04" src="assets/images/04skvar.png">
    <img id="img05c" src="assets/images/05ban.png">
    <img id="img06" src="assets/images/06seg.png">
    <img id="img07" src="assets/images/07app.png">
    <img id="img08" src="assets/images/08app.png">
    <img id="img09" src="assets/images/09park.png">
    <img id="img10" src="assets/images/10des.png">    
  </a-assets>

      <a-entity layout="type: line; margin: 2" position="0 5 -5" gps-entity-place="latitude:59.823811; longitude:22.969292;">
            <a-plane src="#img01"  width="1"  height="1.6667" scale="10 10 0" position="0 0 0"></a-plane>
            <a-plane src="#img02"  width="1"  height="1.6667" scale="10 10 0" position="2 0 0"></a-plane>
            <a-plane src="#img03"  width="1"  height="1.6667" scale="10 10 0" position="4 0 0"></a-plane>
            <a-plane src="#img04"  width="1"  height="1.6667" scale="10 10 0" position="6 0 0"></a-plane>
            <a-plane src="#img05c" width="1"  height="1.6667" scale="10 10 0"  position="8 0 0"></a-plane>
            <a-plane src="#img06"  width="1"  height="1.6667" scale="10 10 0" position="10 0 0"></a-plane>
            <a-plane src="#img07"  width="1"  height="1.6667" scale="10 10 0" position="12 0 0"></a-plane>
            <a-plane src="#img08"  width="1"  height="1.6667" scale="10 10 0" position="14 0 0"></a-plane>
            <a-plane src="#img09"  width="1"  height="1.6667" scale="10 10 0" position="16 0 0"></a-plane>
            <a-plane src="#img10"  width="1"  height="1.6667" scale="10 10 0" position="18 0 0"></a-plane>
</a-entity>

       
      
      <a-camera gps-camera rotation-reader> </a-camera>
    </a-scene>
    
   <div id="textbox">
   <p class="alignleft"> &#8592; </p>
   <p class="aligncenter"> Menu </p>
   <p class="alignright"> &#8594; </p>
 </div>
 <div style="clear: both;"></div>
    <script src="reveal.js"></script>
  </body>
</html>
