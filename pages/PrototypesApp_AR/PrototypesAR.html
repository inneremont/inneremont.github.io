<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>


 

    <a-scene 
        mindar-image="imageTargetSrc: https://inneremont.github.io/pages/PrototypesApp_AR/target/prototypes.mind; maxTrack: 4
        uiScanning:no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
    <a-assets>

    <video 
       video id="poster01"
       crossorigin="anonymous"
       src="https://inneremont.github.io/pages/PrototypesApp_AR/asset/forum.mp4" 
       type="video/mp4" 
       timeout="5000"
       loop="true" 
       
     
       ></video>
       <!-- playsinline autoplay

      <video 
       video id="poster02" 
       crossorigin="anonymous"
       src="https://inneremont.github.io/pages/PrototypesApp_AR/asset/walp.mp4" 
       type="video/mp4" 
       timeout="5000"
       loop="true" 
       
       playsinline autoplay
       ></video>

      <a-asset-item id="pineNeedles" 
        crossorigin="anonymous"
        src="https://inneremont.github.io/pages/PrototypesApp_AR/asset/pineneedles.gltf" 
        timeout="5000"  
         ></a-asset-item> -->


    ></video>
  
      </a-assets>

      <a-camera 
      position="0 0 0" 
      look-controls="enabled: false
      "></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane  material="src: #poster01"  position="0 0 0" height="10" width="2" rotation="0 0 0"></a-plane>
      </a-entity>
<!--
        <a-entity mindar-image-target="targetIndex: 1">
        <a-plane  material="src: #poster02"  position="0 0 0" height="10" width="2" rotation="0 0 0"></a-plane>   
      </a-entity>

         <a-entity mindar-image-target="targetIndex: 2">
        <a-gltf-model rotation="0 0 0 " position="0 -0.25 0" scale="0.05 0.05 0.05" src="#pineNeedles" animation-mixer>
      </a-entity> -->

    </a-scene>
  </body>
</html>
