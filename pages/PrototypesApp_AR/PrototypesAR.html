<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>


 

    <a-scene 
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/inneremont/inneremont.github.io@main/pages/PrototypesApp_AR/target/prototypes02.mind; maxTrack: 2
        uiScanning:no" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
    <a-assets>
      
  
           
      <a-image id="halmstadinv" 
         
           src="https://cdn.jsdelivr.net/gh/inneremont/inneremont.github.io@main/pages/PrototypesApp_AR/asset/halmstinv.jpeg"
           timeout="5000">
      </a-image>
      
      

    <video 
       video id="posterForum"
       crossorigin="anonymous"
       src="https://cdn.jsdelivr.net/gh/inneremont/inneremont.github.io@main/pages/PrototypesApp_AR/asset/forum.mp4" 
       type="video/mp4" 
       timeout="5000"
       loop="true" 
       playsinline autoplay
     
       ></video>
      

      <video 
       video id="posterwalp" 
       crossorigin="anonymous"
       src="https://inneremont.github.io/pages/PrototypesApp_AR/asset/walp.mp4" 
       type="video/mp4" 
       timeout="5000"
       loop="true" 
       
       playsinline autoplay
       ></video>
      
          <video 
       video id="postergodjul"
       crossorigin="anonymous"
       src="https://cdn.jsdelivr.net/gh/inneremont/inneremont.github.io@main/pages/PrototypesApp_AR/asset/godjul.mp4" 
       type="video/mp4" 
       timeout="5000"
       loop="true" 
       playsinline autoplay
     
       ></video>
      
 
      

      <a-asset-item id="pineNeedles" 
        crossorigin="anonymous"
        src="https://inneremont.github.io/pages/PrototypesApp_AR/asset/pineneedles.gltf" 
        timeout="5000"  
         ></a-asset-item> 


    ></video>
  
      </a-assets>

      <a-camera 
      position="0 0 0" 
      look-controls="enabled: false
      "></a-camera>
    
    
       <a-entity mindar-image-target="targetIndex: 1">
        <a-plane  material="src: #postergodjul"  position="0 0 0" height="1.52" width="1.05" rotation="0 0 0"></a-plane>   
      </a-entity>

    
        <a-entity mindar-image-target="targetIndex: 2">
        <a-plane  material="src: #posterwalp"  position="0 0 0" height="1.52" width="1.05" rotation="0 0 0"></a-plane>   
      </a-entity>

         <a-entity mindar-image-target="targetIndex: 4">
        <a-gltf-model rotation="90 0 0 " position="0 0 0" scale="0.5 0.5 0.5" src="#pineNeedles" animation-mixer>
    
      <a-entity mindar-image-target="targetIndex: 5">
        <a-plane  material="src: #posterForum"  position="0 0 0" height="1.52" width="1.05" rotation="0 0 0"></a-plane>
      </a-entity>

      
       <a-entity mindar-image-target="targetIndex: 0">
         <a-image src="#halmstadinv" position="0 0 0" height="1.52" width="1.05" rotation="0 0 0" ></a-image>
      
      </a-entity>    

    </a-scene>
  </body>
</html>
