<!DOCTYPE html>
<html lang="en">
  <head>
    <title>AR Dynamic Planes</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <script src="https://aframe.io/releases/1.0.3/aframe.min.js"></script>

    <script>
      AFRAME.registerComponent('dynamic-planes', {
        init: function () {
          // Create and append a new plane to the scene when the camera moves
          this.el.sceneEl.addEventListener('camera-move', () => {
            const newPlane = document.createElement('a-plane');
            newPlane.setAttribute('width', '1');
            newPlane.setAttribute('height', '1');
            newPlane.setAttribute('color', 'blue');
            // Adjust the position based on the camera's position
            newPlane.setAttribute('position', this.el.getAttribute('position'));
            this.el.sceneEl.appendChild(newPlane);
          });
        }
      });

      AFRAME.registerComponent('camera-listener', {
        init: function () {
          // Listen for camera movement and emit 'camera-move' event
          this.el.sceneEl.addEventListener('camera-moved', () => {
            this.el.emit('camera-move');
          });
        }
      });
    </script>
  </head>
  <body>

    <a-scene>
      <a-camera camera-listener dynamic-planes></a-camera>
    </a-scene>

  </body>
</html>
