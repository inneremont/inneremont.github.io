<!DOCTYPE html>
<html lang="en">
  <head>
    <title>XR test</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <!-- import the webpage's stylesheet -->
    <link rel="stylesheet" href="/style.css">
    
    <script>
      // WebXR requires HTTPS, so the site doesn't work if someone manually enters
      // the URL and ends up using HTTP. To work around this, force redirect from
      // http to https for non-localhost addresses.
      if (window.location.protocol == "http:" &&
          window.location.hostname != "localhost" && 
          window.location.hostname != "127.0.0.1" &&
          window.location.hostname != "[::1]") {
        window.location = window.location.href.replace('http:', 'https:');        
      }
    </script>    
    
    <!-- import the webpage's javascript files -->
    <script src="https://aframe.io/releases/1.0.3/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/2.1.7/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('plane-generator', {
        init: function () {
          this.sceneEl = this.el.sceneEl;

          // Create an initial plane
          this.createNewPlane();
        },

        createNewPlane: function () {
          const cameraEl = this.sceneEl.camera.el;
          const currentPosition = cameraEl.object3D.position.clone();

          // Move the new plane in front of the camera
          const distance = -5; // Adjust this distance as needed
          const direction = new THREE.Vector3();
          cameraEl.object3D.getWorldDirection(direction);
          currentPosition.addScaledVector(direction, distance);

          // Create a new plane
          const newPlane = document.createElement('a-plane');
          newPlane.setAttribute('position', currentPosition);
          newPlane.setAttribute('width', '1');
          newPlane.setAttribute('height', '1');
          newPlane.setAttribute('color', 'red'); // Set color for visibility
          newPlane.setAttribute('shadow', 'cast: true; receive: false');
          this.sceneEl.appendChild(newPlane);
        }
      });
    </script>
  </head>  
  <body>

    <a-scene embedded arjs>
      <a-camera position="0 1.2 0"></a-camera>

      <a-entity id="new-planes" position="-1 0 -3" scale="0.5 0.5 0.5" plane-generator>
        <!-- Existing plane that's always visible -->
        <a-plane position="0 2.15 0" rotation="0 55 0" color="yellow" shadow="cast: true; receive: false"></a-plane>
      </a-entity>  
      
      <a-entity light="type: ambient; intensity: 0.5;"></a-entity>
      <a-light type="directional"
               light="castShadow: true;
                      shadowMapHeight: 1024;
                      shadowMapWidth: 1024;
                      shadowCameraLeft: -7;
                      shadowCameraRight: 5;
                      shadowCameraBottom: -5;
                      shadowCameraTop: 5;"
               id="light"
               target="new-planes"
               position="-5 3 1.5"></a-light>
    </a-scene>

    <div id="text">
      <h1>A-Frame planes for VR/AR</h1>
    
      <p>
        Powered by <a href="https://aframe.io/blog/aframe-v1.0.0/">A-Frame v1.0.0</a>.
      </p>
    </div>
  </body>
</html>
