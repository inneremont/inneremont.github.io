<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene
      renderer="antialias: true"
      embedded
      xr
      stats
      keyboard-shortcuts
      screenshot
      inspector
    >
      <a-entity position="0 1.6 0">
        <a-camera>
          <a-cursor></a-cursor>
        </a-camera>
      </a-entity>

      <a-sky color="#ECECEC"></a-sky>

      <a-light
        type="hemisphere"
        color="#606060"
        ground-color="#404040"
      ></a-light>

      <a-light
        type="directional"
        position="1 1 1"
        target="#your3DModel"
      ></a-light>

      <a-entity
        id="your3DModel"
        geometry="primitive: box; width: 0.06; height: 0.06; depth: 0.06"
        material="color: #ffffff; shader: flat"
      ></a-entity>

      <a-entity
        id="controller"
        laser-controls
        raycaster="objects: #your3DModel"
        line="color: #ECECEC"
      ></a-entity>

      <a-entity
        id="rig"
        teleport-controls="type: parabolic; collisionEntities: [mymodel]"
        movement-controls
        kinematic-body
        position="0 0 0"
      ></a-entity>
    </a-scene>
  </body>
</html>
