<!-- import the webpage's javascript files -->
<script src="https://aframe.io/releases/1.0.3/aframe.min.js"></script>

<script>
  AFRAME.registerComponent('plane-generator', {
    init: function () {
      this.sceneEl = this.el.sceneEl;

      // Function to create a new plane in front of the camera
      const createNewPlane = () => {
        const cameraEl = this.sceneEl.camera.el;
        const position = cameraEl.object3D.position.clone();

        // Move the new plane in front of the camera
        const distance = -5; // Adjust this distance as needed
        const direction = new THREE.Vector3();
        cameraEl.object3D.getWorldDirection(direction);
        position.addScaledVector(direction, distance);

        // Create a new plane
        const newPlane = document.createElement('a-plane');
        newPlane.setAttribute('position', position);
        newPlane.setAttribute('width', '1');
        newPlane.setAttribute('height', '1');
        newPlane.setAttribute('color', 'red'); // Set color for visibility
        newPlane.setAttribute('shadow', 'cast: true; receive: false');
        this.sceneEl.appendChild(newPlane);
      };

      // Create a new plane when the device orientation changes
      window.addEventListener('deviceorientation', createNewPlane);
    },

    tick: function () {
      // This function will be called on every frame render
      // You can use it to continuously update the plane positions based on camera movement
      // For example, you can check if the camera has moved a certain distance and update the planes accordingly
    }
  });
</script>
