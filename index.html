<!DOCTYPE html>
<html lang="en">
  <head>
    <title>AR.js Test</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <!-- Import AR.js and A-Frame -->
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/2.1.7/aframe/build/aframe-ar.js"></script>
    <script src="https://aframe.io/releases/1.0.3/aframe.min.js"></script>
  </head>  
  <body>

    <!-- AR.js scene with a-camera -->    
    <script>
      AFRAME.registerComponent('ar-hit-test', {
        init: function () {
          this.el.sceneEl.addEventListener('arhit', (event) => {
            const hit = event.detail.intersections[0];
            
            // Create a new plane in front of the camera
            this.createNewPlane(hit.position, hit.faceNormal);
          });
        },

        createNewPlane: function (position, faceNormal) {
          // Calculate a position in front of the camera
          const distance = 1; // Adjust as needed
          const newPosition = new THREE.Vector3().copy(position).addScaledVector(faceNormal, distance);

          // Create a new plane
          const newPlane = document.createElement('a-plane');
          newPlane.setAttribute('position', `${newPosition.x} ${newPosition.y} ${newPosition.z}`);
          newPlane.setAttribute('width', '1');
          newPlane.setAttribute('height', '1');
          newPlane.setAttribute('color', 'red'); // Set color for visibility
          newPlane.setAttribute('shadow', 'cast: true; receive: false');
          
          // Attach the new plane to the scene
          this.el.sceneEl.appendChild(newPlane);
        }
      });
    </script>
      <a-scene embedded arjs>
      <a-camera></a-camera>
      
      <!-- AR hit testing component -->
      <a-entity ar-hit-test>
        <!-- Initial plane that's always visible -->
        <a-plane position="0 1.5 -2" rotation="-90 0 0" color="blue" shadow="cast: true; receive: false"></a-plane>
      </a-entity>  
    </a-scene>

    <div id="text">
      <h1>A-Frame planes for AR.js</h1>
      <p>
        Powered by <a href="https://aframe.io/">A-Frame</a> and <a href="https://github.com/AR-js-org/AR.js">AR.js</a>.
      </p>
    </div>
    
  </body>
</html>
