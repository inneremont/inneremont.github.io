<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Marker-Based AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/2.0.8/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene
      embedded
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
    >
      <a-assets timeout="30000">
               <a-asset-item id="spinosaurus" src="https://cdn.glitch.com/324a5290-5aa7-4efc-92d6-ae0736433b12%2Fspinosaurus.glb" response-type="arraybuffer"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        <!-- A marker-specific entity for initialization -->
        <a-entity
          id="dino"
          scale="0.5 0.5 0.5"
          visible="false"  <!-- Initially hide the model -->
        >
          <a-entity
            position="0 2.15 0"
            rotation="0 55 0"
            gltf-model="#spinosaurus"
            animation-mixer
            shadow="cast: true; receive: false"
          ></a-entity>
        </a-entity>

        <!-- A helper entity to store the initial position of the marker -->
        <a-entity
          id="markerHelper"
          visible="false"  <!-- Initially hide the helper entity -->
        ></a-entity>
      </a-marker>

      <!-- Lights configuration omitted for simplicity -->
    </a-scene>

    <script>
      // Variable to store the visibility status
      let modelVisible = false;

      // Function to update the model's position based on the stored marker position
      function updateModelPosition() {
        // Retrieve the stored marker position
        const markerPosition = document.getElementById('markerHelper').object3D.position.clone();

        // Retrieve the model entity
        const dino = document.getElementById('dino');

        // Set the position of the model based on the stored marker position
        dino.object3D.position.copy(markerPosition);

        // Make the model visible
        dino.setAttribute('visible', true);
        modelVisible = true;
      }

      // Update the model's position when the marker is found or updated
      document.getElementById('marker').addEventListener('markerFound', (event) => {
        // Store the initial position of the marker
        document.getElementById('markerHelper').object3D.position.copy(event.target.object3D.position);

        // Update the model's position based on the stored marker position
        updateModelPosition();
      });

      document.getElementById('marker').addEventListener('markerUpdated', () => {
        // Update the model's position based on the stored marker position
        updateModelPosition();
      });

      // Function to hide the model when the marker is lost
      function hideModel() {
        // Hide the model
        document.getElementById('dino').setAttribute('visible', false);
        modelVisible = false;
      }

      // Hide the model when the marker is lost
      document.getElementById('marker').addEventListener('markerLost', () => {
        hideModel();
      });

      // Update the model's position on every frame (optional)
      document.querySelector('a-scene').addEventListener('enterframe', () => {
        if (modelVisible) {
          // You can add additional logic here if needed
        }
      });
    </script>
  </body>
</html>
