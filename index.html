<!DOCTYPE html>
<html lang="en">
  <head>
    <title>XR test</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <!-- import the webpage's stylesheet -->
    <link rel="stylesheet" href="/style.css">
    
    <script>
      // WebXR requires HTTPS, so the site doesn't work if someone manually enters
      // the URL and ends up using HTTP. To work around this, force redirect from
      // http to https for non-localhost addresses.
      if (window.location.protocol == "http:" &&
          window.location.hostname != "localhost" && 
          window.location.hostname != "127.0.0.1" &&
          window.location.hostname != "[::1]") {
        window.location = window.location.href.replace('http:', 'https:');        
      }
    </script>    
    
    <!-- import the webpage's javascript files -->
    <script src="https://aframe.io/releases/1.0.3/aframe.min.js"></script>

    <script>
      AFRAME.registerComponent('plane-generator', {
        init: function () {
          const sceneEl = this.el.sceneEl;

          // Function to create a new plane at the specified position and rotation
          const createNewPlane = (position, rotation) => {
            const newPlane = document.createElement('a-plane');
            newPlane.setAttribute('position', position);
            newPlane.setAttribute('rotation', rotation);
            newPlane.setAttribute('shadow', 'cast: true; receive: false');
            this.el.appendChild(newPlane);
          };

          // Listen for the camera move event to create a new plane
          sceneEl.addEventListener('camera-move', (event) => {
            createNewPlane(event.detail.position, event.detail.rotation);
          });

          // Check the camera's position every tick
          this.el.sceneEl.addEventListener('tick', () => {
            const cameraEl = this.el.sceneEl.camera.el;
            const currentPosition = cameraEl.object3D.position.clone();
            const currentRotation = cameraEl.object3D.rotation.clone();

            if (
              !this.previousPosition ||
              !this.previousPosition.equals(currentPosition) ||
              !this.previousRotation.equals(currentRotation)
            ) {
              // Emit camera move event if the position or rotation changed
              sceneEl.emit('camera-move', { position: currentPosition, rotation: currentRotation });
            }

            // Save the current position and rotation for the next tick
            this.previousPosition = currentPosition;
            this.previousRotation = currentRotation;
          });

          // Initial plane creation
          createNewPlane('0 2.15 -5', '0 0 0'); // You can set the initial position and rotation here
        }
      });
    </script>
  </head>  
  <body>

    <a-scene>
      <a-entity plane-generator></a-entity>
    </a-scene>

    <div id="text">
      <h1>A-Frame planes for VR/AR</h1>
    
      <p>
        Powered by <a href="https://aframe.io/blog/aframe-v1.0.0/">A-Frame v1.0.0</a>.
      </p>
    </div>

    <!-- include the Glitch button to show what the webpage is about and
          to make it easier for folks to view source and remix -->
    <div class="glitchButton" style="position:fixed;top:20px;right:20px;"></div>
    <script src="https://button.glitch.me/button.js"></script>
  </body>
</html>
