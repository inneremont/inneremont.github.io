<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dynamic Plane Drawing in A-Frame</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Camera and controls -->
      <a-camera position="0 1.6 0" id="camera" wasd-controls></a-camera>
      <a-entity id="rig" position="0 0 0">
        <a-entity id="cameraRig" camera look-controls></a-entity>
      </a-entity>

      <!-- Animation to update the plane -->
      <a-entity id="animationLoop" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000;"></a-entity>
    </a-scene>

    <script>
      // Handle animation loop
      const animationLoop = document.getElementById('animationLoop');
      animationLoop.addEventListener('animationloop', function () {
        // Get the camera's current position
        const cameraPosition = document.getElementById('camera').getAttribute('position');

        // Create a new dynamic plane entity on each animation loop
        const dynamicPlane = document.createElement('a-entity');
        dynamicPlane.setAttribute('geometry', 'primitive: plane; width: 2; height: 2');
        dynamicPlane.setAttribute('material', 'color: ' + getRandomColor());
        dynamicPlane.setAttribute('position', `${cameraPosition.x} ${cameraPosition.y} ${cameraPosition.z - 5}`);

        // Append the new plane entity to the scene
        document.querySelector('a-scene').appendChild(dynamicPlane);
      });

      // Function to generate a random color
      function getRandomColor() {
        return '#' + Math.floor(Math.random()*16777215).toString(16);
      }
    </script>
  </body>
</html>
