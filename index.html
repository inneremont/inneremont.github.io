<!DOCTYPE html>
<html lang="en">
  <head>
    <title>AR.js Test</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <!-- Import A-Frame and AR.js -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <!-- AR.js scene with a-camera -->
    <script>
      AFRAME.registerComponent('ar-hit-test', {
        init: function () {
          this.planeAnchor = document.getElementById('plane-anchor');

          // Use the click event for simplicity
          this.el.sceneEl.addEventListener('click', (event) => {
            this.createNewPlane();
          });
        },

        createNewPlane: function () {
          const camera = document.querySelector('a-camera');
          const position = camera.object3D.getWorldPosition();
          const rotation = camera.object3D.getWorldRotation();

          // Calculate a position in front of the camera
          const distance = -2; // Adjust as needed
          const newPosition = new THREE.Vector3(0, 0, distance).applyQuaternion(rotation).add(position);

          // Create a new plane
          const newPlane = document.createElement('a-plane');
          newPlane.setAttribute('position', `${newPosition.x} ${newPosition.y} ${newPosition.z}`);
          newPlane.setAttribute('width', '1');
          newPlane.setAttribute('height', '1');
          newPlane.setAttribute('color', 'red'); // Set color for visibility
          newPlane.setAttribute('shadow', 'cast: true; receive: false');

          // Append the new plane to the anchor entity
          this.planeAnchor.appendChild(newPlane);
        }
      });
    </script>
        <a-scene embedded arjs>
      <a-camera></a-camera>

      <!-- AR hit testing component -->
      <a-entity ar-hit-test>
        <!-- Placeholder entity to anchor new planes -->
        <a-entity id="plane-anchor"></a-entity>
      </a-entity>
    </a-scene>

    <div id="text">
      <h1>A-Frame planes for AR.js</h1>
      <p>
        Powered by <a href="https://aframe.io/">A-Frame</a> and <a href="https://ar-js-org.github.io/AR.js-Docs/">AR.js</a>.
      </p>
    </div>
  </body>
</html>
