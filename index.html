<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>ButkanAR.js demo</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

</head>


<body style="margin: 0; overflow: hidden">
    <script> AFRAME.registerComponent('locationfinder', {
        init : function() {
            navigator.geolocation.getCurrentPosition(function(location){
                console.log(location);
            });
        }

    });
    </script>       

	<a-scene
      vr-mode-ui="enabled: false"
     stats arjs="trackingMethod:best; sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    >
          <a-assets>
    <img id="poster01" src="assets/poster01.jpg">
  </a-assets>
		<a-camera locationfinder gps-camera="simulateLatitude:59.823761; simulateLongitude:22.969217"
        rotation-reader></a-camera>

        <a-image src="#poster01" scale="150 150 150" gps-entity-place="latitude:59.823804; longitude:22.969372;" ></a-image>
	<a-entity text="value: Hello World;" scale="150 150 150"
        gps-entity-place="latitude:59.823804; longitude:22.969372;"></a-entity>

   

   

	</a-scene>
</body>
