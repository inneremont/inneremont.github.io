<script>
  AFRAME.registerComponent('hide-in-ar-mode', {
    init: function () {
      this.el.sceneEl.addEventListener('enter-vr', (ev) => {
        this.wasVisible = this.el.getAttribute('visible');
        if (this.el.sceneEl.is('ar-mode')) {
          this.el.setAttribute('visible', false);
        }
      });
      this.el.sceneEl.addEventListener('exit-vr', (ev) => {
        if (this.wasVisible) this.el.setAttribute('visible', true);
      });
    }
  });
  
  AFRAME.registerComponent('ar-shadows', {
    schema: {
      opacity: {default: 0.3}
    },
    init: function () {
      this.el.sceneEl.addEventListener('enter-vr', (ev) => {
        this.wasVisible = this.el.getAttribute('visible');
        if (this.el.sceneEl.is('ar-mode')) {
          this.savedMaterial = this.el.object3D.children[0].material;
          this.el.object3D.children[0].material = new THREE.ShadowMaterial();
          this.el.object3D.children[0].material.opacity = this.data.opacity;
          this.el.setAttribute('visible', true);
        }
      });
      this.el.sceneEl.addEventListener('exit-vr', (ev) => {
        if (this.savedMaterial) {
          this.el.object3D.children[0].material = this.savedMaterial;
          this.savedMaterial = null;
        }
        if (!this.wasVisible) this.el.setAttribute('visible', false);
      });
    }
  });  

  // Function to create a new dynamic plane
  function createDynamicPlane(position) {
    const dynamicPlane = document.createElement('a-entity');
    dynamicPlane.setAttribute('geometry', 'primitive: plane; width: 2; height: 2');
    dynamicPlane.setAttribute('material', 'color: #00FF00');
    dynamicPlane.setAttribute('position', position);
    
    // Append the new plane entity to the scene
    document.getElementById('planesContainer').appendChild(dynamicPlane);
  }

  // Handle camera movement to create dynamic planes
  AFRAME.registerComponent('camera-listener', {
    init: function () {
      this.cameraEl = document.querySelector('a-camera');
      this.previousPosition = this.cameraEl.getAttribute('position');

      this.el.sceneEl.addEventListener('loaded', () => {
        // Create planes container
        const planesContainer = document.createElement('a-entity');
        planesContainer.setAttribute('id', 'planesContainer');
        this.el.sceneEl.appendChild(planesContainer);
      });
    },
    tick: function () {
      const currentPosition = this.cameraEl.getAttribute('position');

      if (
        currentPosition.x !== this.previousPosition.x ||
        currentPosition.y !== this.previousPosition.y ||
        currentPosition.z !== this.previousPosition.z
      ) {
        // Get the camera's current position and create a new dynamic plane
        createDynamicPlane(`${currentPosition.x} ${currentPosition.y} ${currentPosition.z - 5}`);
      }

      this.previousPosition = currentPosition;
    }
  });
</script>
